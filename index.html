<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأخبار - La Presse Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>La<span>Presse</span></h1>
        </div>
        <div class="menu-icon">✕</div>
    </header>

    <div class="ad-container">
        <p style="font-size: 10px; color: #999; margin-bottom: 5px;">إعلان</p>
        <div class="ad-placeholder">
            رابط إعلان أدستيرا الخاص بك يوضع هنا
        </div>
    </div>

    <nav class="main-menu">
        <ul>
            <li>Actualités</li>
            <li>Société</li>
            <li>Economie</li>
            <li>Culture</li>
            <li>Sport</li>
            <li>HighTech</li>
            <li>Auto</li>
            <li>Monde</li>
            <li>Editorial</li>
        </ul>
    </nav>

    <main>
        <div class="magazine-label">Magazine</div>
        <article class="main-headline">
            <h2>هذا البلد الأفريقي يلغي التأشيرة لجميع الأفارقة: ماذا يجب أن يعرف التونسيون؟</h2>
        </article>
    </main>

</body>
</html>
